<html lang="es">
<head>

  <style>
    .clinic-hero {
      background: var(--surface-dark);
      color: #FFF;
      border-radius: var(--r-xl);
      padding: 28px 32px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .clinic-hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .clinic-hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }
    .clinic-hero-info { display: flex; align-items: center; gap: 18px; }
    .clinic-logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px; color: #FFF;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .clinic-hero-name { font-size: 24px; font-weight: 800; letter-spacing: -0.025em; }
    .clinic-hero-sub { font-size: 13px; opacity: 0.6; margin-top: 3px; }
    .clinic-hero-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .hero-badge {
      padding: 4px 12px;
      border-radius: var(--r-pill);
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
    }
    .hero-badge.plan { background: #FFF; color: var(--surface-dark); border-color: transparent; }
    .hero-badge.active { color: #86EFAC; border-color: rgba(134,239,172,0.3); }
    .hero-badge.warning { color: #FCD34D; border-color: rgba(252,211,77,0.3); }
    .hero-badge.error { color: #FCA5A5; border-color: rgba(252,165,165,0.3); }
    .clinic-hero-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px; border-radius: var(--r-md);
      font-size: 12.5px; font-weight: 600;
      background: rgba(255,255,255,0.1);
      color: #FFF; border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer; transition: all 0.15s;
    }
    .hero-btn:hover { background: rgba(255,255,255,0.18); }
    .hero-btn svg { width: 15px; height: 15px; }
    .hero-btn.primary { background: #FFF; color: var(--surface-dark); border-color: transparent; }
    .hero-btn.primary:hover { background: #F5F5F5; }
    .hero-kpis {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .hero-kpi {
      background: var(--surface-dark);
      padding: 16px 18px;
      text-align: center;
    }
    .hero-kpi-value { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .hero-kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.5; font-weight: 600; margin-top: 3px; }
    .detail-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-tertiary);
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .detail-section-title svg { width: 14px; height: 14px; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-secondary); }
    .detail-value { font-weight: 600; text-align: right; max-width: 60%; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; background: var(--surface-solid);
      border: 1px solid var(--border); border-radius: var(--r-md);
    }
    .activity-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .int-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: var(--r-md);
      border: 1px solid var(--border); background: var(--surface-solid);
    }
    .int-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .int-icon svg { width: 18px; height: 18px; color: #FFF; }
  </style>
</head>

            </div>
            <div>
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="font-weight:600">Usuarios</span>
                <span style="color:var(--text-secondary)">${c.users} <strong style="margin-left:4px">${usersPct}%</strong></span>
              </div>
              <div class="progress-track" style="height:10px"><div class="progress-fill" style="width:${usersPct}%;${usersPct>90?'background:var(--warning)':''}"></div></div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="font-weight:600">Almacenamiento</span>
                <span style="color:var(--text-secondary)">${c.storage} GB / ${c.storageMax} GB <strong style="margin-left:4px">${storagePct}%</strong></span>
              </div>
              <div class="progress-track" style="height:10px"><div class="progress-fill" style="width:${storagePct}%;${storagePct>80?'background:var(--warning)':''}"></div></div>
            </div>
          </div>
        </div>

        <div class="card-solid col-4">
          <div class="detail-section-title"><i data-lucide="plug"></i> Integraciones</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="int-row">
              <div class="int-icon" style="background:#25D366"><i data-lucide="message-circle"></i></div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">WhatsApp</div></div>
              ${intBadge(c.whatsapp)}
            </div>
            <div class="int-row">
              <div class="int-icon" style="background:#4285F4"><i data-lucide="calendar"></i></div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">Google Calendar</div></div>
              ${intBadge(c.gcal)}
            </div>
            <div class="int-row">
              <div class="int-icon" style="background:#0EA5E9"><i data-lucide="send"></i></div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">Telegram</div></div>
              ${intBadge(c.telegram)}
            </div>
            <div class="int-row">
              <div class="int-icon" style="background:#1E3A5F"><span style="color:#FFF;font-weight:800;font-size:8px">SIN</span></div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">Facturación SIN</div></div>
              ${intBadge(c.facturas > 0)}
            </div>
          </div>
        </div>
      </div>

      <!-- ACTIVITY + ACTIONS -->
      <div class="bento">
        <div class="card-solid col-6">
          <div class="detail-section-title"><i data-lucide="clock"></i> Actividad reciente</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="activity-item">
              <div class="activity-dot" style="background:var(--success)"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px">${c.admin} inició sesión</div>
                <div style="font-size:11px;color:var(--text-tertiary)">${c.lastLogin}</div>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-dot" style="background:var(--info)"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px">${c.citasMes} citas registradas este mes</div>
                <div style="font-size:11px;color:var(--text-tertiary)">Abril 2026</div>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-dot" style="background:var(--success)"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px">${c.facturas} facturas emitidas</div>
                <div style="font-size:11px;color:var(--text-tertiary)">Abril 2026 · SIN Bolivia</div>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-dot" style="background:var(--accent)"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px">Pago de suscripción: ${c.mrr}</div>
                <div style="font-size:11px;color:var(--text-tertiary)">8 abril 2026 · ${c.status === 'Pago fallido' ? '<span style="color:var(--error)">Fallido</span>' : 'Cobrado'}</div>
              </div>
            </div>
            ${c.status === 'Sin actividad' ? `
            <div class="activity-item" style="border-color:var(--error)">
              <div class="activity-dot" style="background:var(--error)"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px;color:var(--error)">Sin actividad por 14 días</div>
                <div style="font-size:11px;color:var(--text-tertiary)">Posible churn — contactar admin</div>
              </div>
            </div>` : ''}
          </div>
        </div>

        <div class="card-solid col-6">
          <div class="detail-section-title"><i data-lucide="shield"></i> Acciones de superadmin</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Impersonando ${c.name}','info')"><i data-lucide="user-check"></i> Impersonar clínica</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Email enviado','success')"><i data-lucide="mail"></i> Contactar admin</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Facturación abierta','info')"><i data-lucide="file-text"></i> Ver facturas SIN</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Logs de auditoría','info')"><i data-lucide="scroll-text"></i> Ver audit log</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Plan actualizado','success')"><i data-lucide="arrow-up-circle"></i> Cambiar plan</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Backup descargado','success')"><i data-lucide="download"></i> Descargar backup</button>
            <button class="btn btn-secondary" style="justify-content:center" onclick="showToast('Extendido 30 días','success')"><i data-lucide="calendar-plus"></i> Extender vencimiento</button>
            <button class="btn btn-secondary" style="justify-content:center;color:var(--error)" onclick="showToast('Tenant suspendido','error')"><i data-lucide="pause-circle"></i> Suspender tenant</button>
          </div>
        </div>
      </div>
    `;

    lucide.createIcons();
  </script>
</body>
</html>
